<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" role="img">
<title>Socle — Free. Simple. Yours.</title>
<desc>Socle library branding on light background: app icon format with dark container and light mark, wordmark in lowercase</desc>

<style>
  .bg        { fill: #F5F2EE; }
  .icon-bg   { fill: #1C1C1E; rx: 20; }
  .mark      { fill: #F5F2EE; }
  .acc       { fill: #E8824A; }
  .wm        { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 62px; font-weight: 500; fill: #1C1C1E; }
  .tag       { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 17px; font-weight: 500; fill: #1C1C1E; letter-spacing: 0.04em; }
  .lbl       { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 400; fill: #AEAEB2; }
  .div       { fill: #E4E0DA; }
</style>

<rect width="680" height="320" class="bg"/>

<!-- Icon mark — app icon container -->
<rect x="28" y="22" width="120" height="120" rx="26" fill="#1C1C1E"/>

<!-- Mark inside container (light, centered in the 120x120 container) -->
<!-- Body: centered at x=88, y=82 -->
<rect x="54" y="38" width="68" height="54" rx="4" class="mark"/>
<rect x="54" y="38" width="68" height="8" rx="4" class="acc"/>
<rect x="40" y="92" width="96" height="17" rx="3" class="mark"/>

<!-- Wordmark -->
<text x="172" y="88" class="wm">socle</text>

<!-- Tagline -->
<text x="174" y="120" class="tag">Free. Simple. Yours.</text>

<!-- Divider -->
<rect x="40" y="162" width="600" height="0.5" class="div"/>

<!-- Icon variants label -->
<text x="40" y="186" class="lbl">Icon mark — 80 · 48 · 32 · 16 px</text>

<!-- 80px app icon -->
<rect x="50" y="200" width="80" height="80" rx="18" fill="#1C1C1E"/>
<rect x="67" y="216" width="46" height="36" rx="3" class="mark"/>
<rect x="67" y="216" width="46" height="6" rx="3" class="acc"/>
<rect x="58" y="252" width="64" height="11" rx="2" class="mark"/>
<text x="90" y="298" text-anchor="middle" class="lbl">80px</text>

<!-- 48px app icon -->
<rect x="205" y="216" width="48" height="48" rx="11" fill="#1C1C1E"/>
<rect x="217" y="224" width="24" height="19" rx="2" class="mark"/>
<rect x="217" y="224" width="24" height="4" rx="2" class="acc"/>
<rect x="212" y="243" width="34" height="7" rx="1" class="mark"/>
<text x="229" y="280" text-anchor="middle" class="lbl">48px</text>

<!-- 32px app icon -->
<rect x="330" y="224" width="32" height="32" rx="7" fill="#1C1C1E"/>
<rect x="339" y="230" width="14" height="11" rx="1" class="mark"/>
<rect x="339" y="230" width="14" height="3" rx="1" class="acc"/>
<rect x="335" y="241" width="22" height="5" rx="1" class="mark"/>
<text x="346" y="271" text-anchor="middle" class="lbl">32px</text>

<!-- 16px app icon -->
<rect x="432" y="232" width="16" height="16" rx="4" fill="#1C1C1E"/>
<rect x="436" y="235" width="8" height="6" rx="1" class="mark"/>
<rect x="436" y="235" width="8" height="2" rx="1" class="acc"/>
<rect x="434" y="241" width="12" height="3" rx="1" class="mark"/>
<text x="440" y="263" text-anchor="middle" class="lbl">16px</text>

</svg>
